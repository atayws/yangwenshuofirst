<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">PPO驱动的低空网络多路径隐蔽传输策略选择模型</title>
  <desc id="desc">展示PPO以三条链路网络状态为输入，输出隐蔽传输策略和链路关系，并根据奖励反馈更新模型。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="ppoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FAFF"/>
      <stop offset="100%" stop-color="#EEF7FF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0F172A" flood-opacity="0.11"/>
    </filter>
    <filter id="softShadow" x="-12%" y="-14%" width="124%" height="135%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGray" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#059669"/>
    </marker>
    <style>
      .cn { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "PingFang SC", "SimHei", Arial, sans-serif; }
      .math { font-family: "Cambria Math", "Times New Roman", Cambria, serif; font-style: italic; }
      .title { font-size: 38px; font-weight: 800; fill: #102A43; letter-spacing: .2px; }
      .subtitle { font-size: 19px; fill: #64748B; }
      .cardTitle { font-size: 26px; font-weight: 800; fill: #0F172A; }
      .cardSub { font-size: 17px; fill: #64748B; }
      .moduleTitle { font-size: 24px; font-weight: 800; fill: #1E40AF; }
      .actorTitle { font-size: 23px; font-weight: 800; fill: #C2410C; }
      .criticTitle { font-size: 23px; font-weight: 800; fill: #166534; }
      .outTitle { font-size: 23px; font-weight: 800; fill: #0F172A; }
      .body { font-size: 17px; fill: #334155; }
      .small { font-size: 15px; fill: #64748B; }
      .formula { font-size: 23px; fill: #111827; }
      .formulaLarge { font-size: 30px; fill: #111827; }
      .pillText { font-size: 16px; font-weight: 700; fill: #FFFFFF; }
      .pathName { font-size: 18px; font-weight: 800; fill: #334155; }
      .arrow { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .thinArrow { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="48" text-anchor="middle" class="cn title">PPO 驱动的低空网络多路径隐蔽传输策略选择模型</text>
  <text x="800" y="80" text-anchor="middle" class="cn subtitle">输入三条链路网络状态，输出隐蔽传输策略与链路关系</text>

  <!-- Main background panel -->
  <rect x="52" y="110" width="1496" height="655" rx="30" fill="#FFFFFF" stroke="#D7E0EA" stroke-width="2" filter="url(#shadow)"/>

  <!-- Input card -->
  <g filter="url(#softShadow)">
    <rect x="90" y="160" width="355" height="500" rx="26" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  </g>
  <text x="268" y="210" text-anchor="middle" class="cn cardTitle">三链路状态输入</text>
  <text x="268" y="242" text-anchor="middle" class="math formulaLarge">S<tspan baseline-shift="sub" font-size="17">t</tspan></text>

  <!-- Path state rows -->
  <g>
    <rect x="128" y="270" width="278" height="92" rx="18" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.8"/>
    <text x="267" y="303" text-anchor="middle" class="cn pathName">Path 0</text>
    <text x="267" y="331" text-anchor="middle" class="cn small">时延 / 丢包 / 抖动</text>
    <text x="267" y="354" text-anchor="middle" class="cn small">吞吐量 / 队列深度 / 解码正确率</text>

    <rect x="128" y="383" width="278" height="92" rx="18" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.8"/>
    <text x="267" y="416" text-anchor="middle" class="cn pathName">Path 1</text>
    <text x="267" y="444" text-anchor="middle" class="cn small">时延 / 丢包 / 抖动</text>
    <text x="267" y="467" text-anchor="middle" class="cn small">吞吐量 / 队列深度 / 解码正确率</text>

    <rect x="128" y="496" width="278" height="92" rx="18" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.8"/>
    <text x="267" y="529" text-anchor="middle" class="cn pathName">Path 2</text>
    <text x="267" y="557" text-anchor="middle" class="cn small">时延 / 丢包 / 抖动</text>
    <text x="267" y="580" text-anchor="middle" class="cn small">吞吐量 / 队列深度 / 解码正确率</text>
  </g>

  <rect x="132" y="602" width="270" height="40" rx="20" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="267" y="628" text-anchor="middle" class="math formula">S<tspan baseline-shift="sub" font-size="14">t</tspan>=[s<tspan baseline-shift="sub" font-size="14">0</tspan>,s<tspan baseline-shift="sub" font-size="14">1</tspan>,s<tspan baseline-shift="sub" font-size="14">2</tspan>]</text>

  <!-- PPO card -->
  <g filter="url(#softShadow)">
    <rect x="560" y="150" width="480" height="520" rx="30" fill="url(#ppoGrad)" stroke="#93C5FD" stroke-width="2.2"/>
  </g>
  <text x="800" y="205" text-anchor="middle" class="cn cardTitle">PPO 策略选择器</text>
  <text x="800" y="236" text-anchor="middle" class="cn cardSub">Actor-Critic 结构</text>

  <!-- State encoder -->
  <g filter="url(#softShadow)">
    <rect x="626" y="275" width="348" height="70" rx="18" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
  </g>
  <text x="800" y="306" text-anchor="middle" class="cn moduleTitle">状态编码与融合</text>
  <text x="800" y="332" text-anchor="middle" class="math formula">z<tspan baseline-shift="sub" font-size="14">t</tspan> = f(S<tspan baseline-shift="sub" font-size="14">t</tspan>)</text>

  <g filter="url(#softShadow)">
    <rect x="626" y="390" width="348" height="86" rx="18" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  </g>
  <text x="800" y="424" text-anchor="middle" class="cn actorTitle">Actor 策略网络</text>
  <text x="800" y="455" text-anchor="middle" class="math formula">π<tspan baseline-shift="sub" font-size="14">θ</tspan>(a<tspan baseline-shift="sub" font-size="14">t</tspan>|z<tspan baseline-shift="sub" font-size="14">t</tspan>)</text>

  <g filter="url(#softShadow)">
    <rect x="626" y="518" width="348" height="86" rx="18" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
  </g>
  <text x="800" y="552" text-anchor="middle" class="cn criticTitle">Critic 价值网络</text>
  <text x="800" y="583" text-anchor="middle" class="math formula">V<tspan baseline-shift="sub" font-size="14">φ</tspan>(z<tspan baseline-shift="sub" font-size="14">t</tspan>)</text>

  <!-- Output card -->
  <g filter="url(#softShadow)">
    <rect x="1155" y="160" width="355" height="500" rx="26" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  </g>
  <text x="1333" y="210" text-anchor="middle" class="cn cardTitle">动作输出</text>
  <text x="1333" y="242" text-anchor="middle" class="math formulaLarge">a<tspan baseline-shift="sub" font-size="17">t</tspan></text>

  <g filter="url(#softShadow)">
    <rect x="1202" y="292" width="260" height="88" rx="20" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  </g>
  <text x="1332" y="326" text-anchor="middle" class="cn outTitle">选择隐蔽策略</text>
  <text x="1332" y="358" text-anchor="middle" class="cn body">策略 0 ～ 策略 5</text>

  <g filter="url(#softShadow)">
    <rect x="1202" y="430" width="260" height="88" rx="20" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
  </g>
  <text x="1332" y="464" text-anchor="middle" class="cn outTitle">选择链路关系</text>
  <text x="1332" y="496" text-anchor="middle" class="cn body">单路径 / 多路径组合</text>

  <rect x="1210" y="576" width="245" height="44" rx="22" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="1332" y="604" text-anchor="middle" class="math formula">a<tspan baseline-shift="sub" font-size="14">t</tspan>=(strategy, path)</text>

  <!-- Arrows between cards -->
  <path d="M445 410 L545 410" class="arrow" stroke="#2563EB" marker-end="url(#arrowBlue)"/>
  <path d="M1040 410 L1140 410" class="arrow" stroke="#2563EB" marker-end="url(#arrowBlue)"/>

  <!-- Reward bottom loop -->
  <g filter="url(#softShadow)">
    <rect x="455" y="710" width="690" height="64" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  </g>
  <text x="800" y="735" text-anchor="middle" class="cn outTitle">奖励反馈</text>
  <text x="800" y="763" text-anchor="middle" class="math formula">R = α·Correct + β·Rate + γ·Stealth - δ·Impact - ε·Overhead</text>

  <path d="M1332 660 C1332 735, 1230 742, 1160 742" class="thinArrow" stroke="#059669" marker-end="url(#arrowGreen)"/>
  <path d="M455 742 C330 742, 265 690, 265 660" class="thinArrow" stroke="#059669" stroke-dasharray="10 8" marker-end="url(#arrowGreen)"/>
  <path d="M800 710 C800 660, 800 635, 800 608" class="thinArrow" stroke="#059669" stroke-dasharray="10 8" marker-end="url(#arrowGreen)"/>

  <!-- Footer pipeline -->
  <rect x="95" y="818" width="1410" height="52" rx="18" fill="#F8FAFC" stroke="#2563EB" stroke-width="2"/>
  <text x="250" y="852" text-anchor="middle" class="cn moduleTitle">INT 状态感知</text>
  <path d="M405 844 L535 844" class="thinArrow" stroke="#2563EB" marker-end="url(#arrowBlue)"/>
  <text x="675" y="852" text-anchor="middle" class="cn moduleTitle">PPO 决策</text>
  <path d="M805 844 L935 844" class="thinArrow" stroke="#2563EB" marker-end="url(#arrowBlue)"/>
  <text x="1095" y="852" text-anchor="middle" class="cn moduleTitle">策略与路径执行</text>
  <path d="M1270 844 L1400 844" class="thinArrow" stroke="#2563EB" marker-end="url(#arrowBlue)"/>
  <text x="1450" y="852" text-anchor="middle" class="cn moduleTitle">更新</text>
</svg>
