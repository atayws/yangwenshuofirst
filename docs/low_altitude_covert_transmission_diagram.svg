<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">低空多路径物联网隐蔽传输系统示意图</title>
  <desc id="desc">竖向展示隐蔽数据发送端、发送端可编程交换机、三条物联网链路以及搭载轻型可编程交换机的低空网络物联网接收设备。</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="100%" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F6FED"/>
      <stop offset="100%" stop-color="#1F9BCF"/>
    </linearGradient>
    <linearGradient id="switchGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F3A5F"/>
      <stop offset="100%" stop-color="#2F6F92"/>
    </linearGradient>
    <linearGradient id="receiverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#213547"/>
      <stop offset="100%" stop-color="#2E7D6B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#123047" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0B2239" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2F6FED"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#16A085"/>
    </marker>
    <marker id="arrowGray" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#64748B"/>
    </marker>
    <style>
      .font { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; }
      .title { font-size: 42px; font-weight: 700; fill: #0F2437; letter-spacing: 1px; }
      .subtitle { font-size: 22px; fill: #52677A; }
      .card-title { font-size: 30px; font-weight: 700; fill: #FFFFFF; }
      .card-subtitle { font-size: 19px; fill: #DCEAF3; }
      .dark-title { font-size: 29px; font-weight: 700; fill: #0F2437; }
      .body { font-size: 20px; fill: #43576B; }
      .small { font-size: 17px; fill: #5B7084; }
      .label { font-size: 18px; font-weight: 700; fill: #24445C; }
      .pill { font-size: 16px; font-weight: 700; fill: #FFFFFF; }
      .caption { font-size: 18px; fill: #334E68; }
      .mono { font-family: Consolas, "Courier New", monospace; font-size: 16px; fill: #0E8F6E; }
    </style>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <circle cx="150" cy="310" r="180" fill="#DDEAF7" opacity="0.35"/>
  <circle cx="930" cy="1390" r="230" fill="#DDF4ED" opacity="0.40"/>

  <text x="540" y="82" text-anchor="middle" class="font title">低空多路径物联网隐蔽传输系统</text>
  <text x="540" y="124" text-anchor="middle" class="font subtitle">正常业务流承载隐蔽数据 · P4 多路径转发 · INT 链路状态感知</text>

  <!-- Sender card -->
  <g filter="url(#shadow)">
    <rect x="170" y="170" rx="24" ry="24" width="740" height="230" fill="url(#blueGrad)"/>
    <rect x="195" y="200" rx="18" ry="18" width="690" height="170" fill="#FFFFFF" opacity="0.10"/>
  </g>
  <g class="font">
    <text x="395" y="232" class="card-title">隐蔽数据发送端</text>
    <text x="395" y="269" class="card-subtitle">业务应用 + 隐蔽编码模块</text>
    <text x="395" y="307" class="card-subtitle">将隐蔽比特嵌入正常 UDP/IoT 业务流</text>
  </g>
  <g transform="translate(230,218)">
    <rect x="0" y="0" width="104" height="78" rx="10" fill="#FFFFFF" opacity="0.92"/>
    <rect x="12" y="12" width="80" height="45" rx="4" fill="#D9EAFB"/>
    <rect x="30" y="66" width="44" height="8" rx="4" fill="#FFFFFF" opacity="0.92"/>
    <rect x="13" y="86" width="78" height="8" rx="4" fill="#FFFFFF" opacity="0.88"/>
  </g>
  <g transform="translate(685,234)" filter="url(#softShadow)">
    <rect x="0" y="0" width="155" height="92" rx="20" fill="#0F2437" opacity="0.90"/>
    <text x="78" y="35" text-anchor="middle" class="font mono">101101</text>
    <text x="78" y="64" text-anchor="middle" class="font pill">隐蔽比特流</text>
  </g>

  <!-- Down arrow -->
  <path d="M540 418 L540 502" stroke="#2F6FED" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="572" y="470" class="font small">业务包封装 / 调度输入</text>

  <!-- Sender switch -->
  <g filter="url(#shadow)">
    <rect x="170" y="530" rx="24" ry="24" width="740" height="220" fill="url(#switchGrad)"/>
  </g>
  <g class="font">
    <text x="540" y="590" text-anchor="middle" class="card-title">发送端可编程交换机</text>
    <text x="540" y="630" text-anchor="middle" class="card-subtitle">P4 数据平面：解析、转发、路径选择与 INT 采样</text>
  </g>
  <g transform="translate(278,666)">
    <rect x="0" y="0" width="150" height="42" rx="21" fill="#E9F4FF" opacity="0.96"/>
    <text x="75" y="27" text-anchor="middle" class="font label">单链路转发</text>
    <rect x="188" y="0" width="150" height="42" rx="21" fill="#E8F8F3" opacity="0.96"/>
    <text x="263" y="27" text-anchor="middle" class="font label">轮询转发</text>
    <rect x="376" y="0" width="150" height="42" rx="21" fill="#FFF2D9" opacity="0.96"/>
    <text x="451" y="27" text-anchor="middle" class="font label">多路径协同</text>
  </g>

  <!-- Link region -->
  <text x="540" y="830" text-anchor="middle" class="font dark-title">三条物联网链路</text>
  <text x="540" y="862" text-anchor="middle" class="font body">模拟 5G / WiFi / 卫星等异构低空通信链路</text>

  <path d="M350 765 C350 880 350 1020 350 1365" stroke="#2F6FED" stroke-width="20" stroke-linecap="round" opacity="0.82" marker-end="url(#arrowBlue)"/>
  <path d="M540 765 C540 890 540 1045 540 1365" stroke="#16A085" stroke-width="20" stroke-linecap="round" opacity="0.82" marker-end="url(#arrowGreen)"/>
  <path d="M730 765 C730 880 730 1020 730 1365" stroke="#F2A93B" stroke-width="20" stroke-linecap="round" opacity="0.88" marker-end="url(#arrowGray)"/>

  <g class="font">
    <rect x="255" y="900" width="190" height="82" rx="18" fill="#FFFFFF" opacity="0.92" filter="url(#softShadow)"/>
    <text x="350" y="932" text-anchor="middle" class="label">链路 1</text>
    <text x="350" y="962" text-anchor="middle" class="small">低时延 / 主链路</text>

    <rect x="445" y="980" width="190" height="82" rx="18" fill="#FFFFFF" opacity="0.92" filter="url(#softShadow)"/>
    <text x="540" y="1012" text-anchor="middle" class="label">链路 2</text>
    <text x="540" y="1042" text-anchor="middle" class="small">中等抖动 / 备用</text>

    <rect x="635" y="900" width="190" height="82" rx="18" fill="#FFFFFF" opacity="0.92" filter="url(#softShadow)"/>
    <text x="730" y="932" text-anchor="middle" class="label">链路 3</text>
    <text x="730" y="962" text-anchor="middle" class="small">弱网 / 冗余路径</text>
  </g>

  <!-- Packets with hidden data -->
  <g filter="url(#softShadow)">
    <g transform="translate(304,1088)">
      <rect width="92" height="48" rx="10" fill="#FFFFFF"/>
      <rect x="12" y="14" width="45" height="8" rx="4" fill="#8DBCF5"/>
      <circle cx="69" cy="24" r="7" fill="#17B889"/>
      <text x="46" y="69" text-anchor="middle" class="font small">业务包</text>
    </g>
    <g transform="translate(494,1138)">
      <rect width="92" height="48" rx="10" fill="#FFFFFF"/>
      <rect x="12" y="14" width="45" height="8" rx="4" fill="#7DD5C0"/>
      <circle cx="69" cy="24" r="7" fill="#17B889"/>
      <text x="46" y="69" text-anchor="middle" class="font small">隐蔽嵌入</text>
    </g>
    <g transform="translate(684,1088)">
      <rect width="92" height="48" rx="10" fill="#FFFFFF"/>
      <rect x="12" y="14" width="45" height="8" rx="4" fill="#F5CA74"/>
      <circle cx="69" cy="24" r="7" fill="#17B889"/>
      <text x="46" y="69" text-anchor="middle" class="font small">路径序列</text>
    </g>
  </g>

  <!-- Covert feature callouts -->
  <g class="font" filter="url(#softShadow)">
    <rect x="130" y="1198" width="288" height="132" rx="20" fill="#FFFFFF" opacity="0.94"/>
    <text x="160" y="1242" class="label">隐蔽承载元素</text>
    <text x="160" y="1276" class="small">• 包间时序差异</text>
    <text x="160" y="1306" class="small">• IP-ID / 包长统计</text>

    <rect x="662" y="1198" width="288" height="132" rx="20" fill="#FFFFFF" opacity="0.94"/>
    <text x="692" y="1242" class="label">链路状态输入</text>
    <text x="692" y="1276" class="small">• 时延 / 抖动 / 丢包</text>
    <text x="692" y="1306" class="small">• 带宽利用 / 队列深度</text>
  </g>

  <!-- INT feedback -->
  <path d="M875 1395 C1000 1210 1010 925 875 735" fill="none" stroke="#64748B" stroke-width="5" stroke-dasharray="14 12" marker-end="url(#arrowGray)"/>
  <g class="font" transform="translate(812,990)">
    <rect x="0" y="0" width="172" height="72" rx="18" fill="#FFFFFF" opacity="0.96" filter="url(#softShadow)"/>
    <text x="86" y="30" text-anchor="middle" class="label">INT 反馈</text>
    <text x="86" y="56" text-anchor="middle" class="small">链路状态感知</text>
  </g>

  <!-- Receiver -->
  <g filter="url(#shadow)">
    <rect x="150" y="1430" rx="28" ry="28" width="780" height="300" fill="url(#receiverGrad)"/>
    <rect x="185" y="1472" rx="22" ry="22" width="710" height="202" fill="#FFFFFF" opacity="0.11"/>
  </g>
  <g class="font">
    <text x="540" y="1494" text-anchor="middle" class="card-title">低空网络物联网设备（接收端）</text>
    <text x="540" y="1535" text-anchor="middle" class="card-subtitle">轻型可编程交换机 + 接收分发与隐蔽解码模块</text>
  </g>
  <g transform="translate(238,1574)">
    <rect x="0" y="62" width="118" height="58" rx="16" fill="#E7F7F1"/>
    <circle cx="59" cy="52" r="34" fill="#BEEADB"/>
    <path d="M20 48 L-42 28 M98 48 L160 28 M20 56 L-42 82 M98 56 L160 82" stroke="#E7F7F1" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-48" cy="26" r="14" fill="#DFF7EF"/>
    <circle cx="166" cy="26" r="14" fill="#DFF7EF"/>
    <circle cx="-48" cy="84" r="14" fill="#DFF7EF"/>
    <circle cx="166" cy="84" r="14" fill="#DFF7EF"/>
  </g>
  <g class="font" transform="translate(440,1585)">
    <rect x="0" y="0" width="392" height="54" rx="27" fill="#FFFFFF" opacity="0.94"/>
    <text x="196" y="35" text-anchor="middle" class="label">识别策略 → 分发解码 → 恢复隐蔽数据</text>
    <rect x="40" y="76" width="312" height="54" rx="27" fill="#0F2437" opacity="0.68"/>
    <text x="196" y="111" text-anchor="middle" class="font pill">正常业务通信保持连续</text>
  </g>

  <!-- Footer legend -->
  <g class="font">
    <line x1="168" y1="1810" x2="912" y2="1810" stroke="#C9D6E2" stroke-width="2"/>
    <circle cx="230" cy="1850" r="8" fill="#17B889"/>
    <text x="250" y="1857" class="caption">绿色标记表示隐蔽信息嵌入点</text>
    <line x1="510" y1="1850" x2="570" y2="1850" stroke="#64748B" stroke-width="5" stroke-dasharray="12 8"/>
    <text x="590" y="1857" class="caption">虚线表示 INT 状态反馈</text>
  </g>
</svg>
