<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="560" viewBox="0 0 1300 560" role="img" aria-labelledby="title desc">
  <title id="title">策略5路径序列局部示意图</title>
  <desc id="desc">只保留PPT需要截取的路径序列编码部分，三条路径间距较小，符号与数据包编号字体放大。</desc>
  <defs>
    <filter id="packetShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#94A3B8"/>
    </marker>
    <style>
      .cn { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "PingFang SC", "SimHei", Arial, sans-serif; }
      .lane { stroke: #CBD5E1; stroke-width: 9; stroke-linecap: round; }
      .laneCore { stroke: #94A3B8; stroke-width: 3; stroke-linecap: round; opacity: .72; }
      .laneLabel { font-size: 28px; font-weight: 800; fill: #334155; }
      .sep { stroke: #94A3B8; stroke-width: 2.5; stroke-dasharray: 10 10; opacity: .95; }
      .symbolTitle { font-size: 28px; font-weight: 800; fill: #0F172A; }
      .symbolSeq { font-size: 17px; font-weight: 600; fill: #64748B; }
      .packetNo { font-size: 30px; font-weight: 900; fill: #FFFFFF; }
      .dashBlue { stroke: #2563EB; stroke-width: 3.2; stroke-dasharray: 9 8; fill: none; opacity: .72; }
      .dashGreen { stroke: #059669; stroke-width: 3.2; stroke-dasharray: 9 8; fill: none; opacity: .72; }
      .dashOrange { stroke: #EA580C; stroke-width: 3.2; stroke-dasharray: 9 8; fill: none; opacity: .72; }
      .dashPink { stroke: #DB2777; stroke-width: 3.2; stroke-dasharray: 9 8; fill: none; opacity: .72; }
    </style>
  </defs>

  <rect width="1300" height="560" fill="#FFFFFF"/>

  <!-- Symbol labels -->
  <g>
    <rect x="102" y="28" width="190" height="66" rx="18" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
    <text x="197" y="61" text-anchor="middle" class="cn symbolTitle">符号 00</text>
    <text x="197" y="84" text-anchor="middle" class="cn symbolSeq">0 → 1 → 2</text>

    <rect x="372" y="28" width="190" height="66" rx="18" fill="#ECFDF5" stroke="#059669" stroke-width="2.5"/>
    <text x="467" y="61" text-anchor="middle" class="cn symbolTitle">符号 01</text>
    <text x="467" y="84" text-anchor="middle" class="cn symbolSeq">1 → 2 → 0</text>

    <rect x="642" y="28" width="190" height="66" rx="18" fill="#FFF7ED" stroke="#EA580C" stroke-width="2.5"/>
    <text x="737" y="61" text-anchor="middle" class="cn symbolTitle">符号 10</text>
    <text x="737" y="84" text-anchor="middle" class="cn symbolSeq">2 → 0 → 1</text>

    <rect x="912" y="28" width="190" height="66" rx="18" fill="#FDF2F8" stroke="#DB2777" stroke-width="2.5"/>
    <text x="1007" y="61" text-anchor="middle" class="cn symbolTitle">符号 11</text>
    <text x="1007" y="84" text-anchor="middle" class="cn symbolSeq">0 → 2 → 1</text>
  </g>

  <!-- Group separators -->
  <line x1="332" y1="110" x2="332" y2="535" class="sep"/>
  <line x1="602" y1="110" x2="602" y2="535" class="sep"/>
  <line x1="872" y1="110" x2="872" y2="535" class="sep"/>
  <line x1="1142" y1="110" x2="1142" y2="535" class="sep"/>

  <!-- Lanes -->
  <line x1="115" y1="175" x2="1230" y2="175" class="lane"/>
  <line x1="115" y1="305" x2="1230" y2="305" class="lane"/>
  <line x1="115" y1="435" x2="1230" y2="435" class="lane"/>
  <path d="M115 175 L1230 175" class="laneCore" marker-end="url(#arrow)"/>
  <path d="M115 305 L1230 305" class="laneCore" marker-end="url(#arrow)"/>
  <path d="M115 435 L1230 435" class="laneCore" marker-end="url(#arrow)"/>

  <text x="98" y="184" text-anchor="end" class="cn laneLabel">Path 0</text>
  <text x="98" y="314" text-anchor="end" class="cn laneLabel">Path 1</text>
  <text x="98" y="444" text-anchor="end" class="cn laneLabel">Path 2</text>

  <!-- Group 00: 0 -> 1 -> 2 -->
  <circle cx="145" cy="175" r="34" fill="#2563EB" filter="url(#packetShadow)"/>
  <text x="145" y="185" text-anchor="middle" class="cn packetNo">1</text>
  <circle cx="200" cy="305" r="34" fill="#2563EB" filter="url(#packetShadow)"/>
  <text x="200" y="315" text-anchor="middle" class="cn packetNo">2</text>
  <circle cx="255" cy="435" r="34" fill="#2563EB" filter="url(#packetShadow)"/>
  <text x="255" y="445" text-anchor="middle" class="cn packetNo">3</text>
  <path d="M156 207 C170 245, 185 275, 192 276" class="dashBlue"/>
  <path d="M211 337 C225 375, 240 405, 247 406" class="dashBlue"/>

  <!-- Group 01: 1 -> 2 -> 0 -->
  <circle cx="415" cy="305" r="34" fill="#059669" filter="url(#packetShadow)"/>
  <text x="415" y="315" text-anchor="middle" class="cn packetNo">1</text>
  <circle cx="470" cy="435" r="34" fill="#059669" filter="url(#packetShadow)"/>
  <text x="470" y="445" text-anchor="middle" class="cn packetNo">2</text>
  <circle cx="525" cy="175" r="34" fill="#059669" filter="url(#packetShadow)"/>
  <text x="525" y="185" text-anchor="middle" class="cn packetNo">3</text>
  <path d="M426 337 C440 375, 455 405, 462 406" class="dashGreen"/>
  <path d="M481 406 C503 345, 518 255, 522 207" class="dashGreen"/>

  <!-- Group 10: 2 -> 0 -> 1 -->
  <circle cx="685" cy="435" r="34" fill="#EA580C" filter="url(#packetShadow)"/>
  <text x="685" y="445" text-anchor="middle" class="cn packetNo">1</text>
  <circle cx="740" cy="175" r="34" fill="#EA580C" filter="url(#packetShadow)"/>
  <text x="740" y="185" text-anchor="middle" class="cn packetNo">2</text>
  <circle cx="795" cy="305" r="34" fill="#EA580C" filter="url(#packetShadow)"/>
  <text x="795" y="315" text-anchor="middle" class="cn packetNo">3</text>
  <path d="M696 406 C718 345, 733 255, 737 207" class="dashOrange"/>
  <path d="M751 207 C765 245, 780 275, 787 276" class="dashOrange"/>

  <!-- Group 11: 0 -> 2 -> 1 -->
  <circle cx="955" cy="175" r="34" fill="#DB2777" filter="url(#packetShadow)"/>
  <text x="955" y="185" text-anchor="middle" class="cn packetNo">1</text>
  <circle cx="1010" cy="435" r="34" fill="#DB2777" filter="url(#packetShadow)"/>
  <text x="1010" y="445" text-anchor="middle" class="cn packetNo">2</text>
  <circle cx="1065" cy="305" r="34" fill="#DB2777" filter="url(#packetShadow)"/>
  <text x="1065" y="315" text-anchor="middle" class="cn packetNo">3</text>
  <path d="M966 207 C988 268, 1003 358, 1007 403" class="dashPink"/>
  <path d="M1021 406 C1035 368, 1050 338, 1057 337" class="dashPink"/>
</svg>
