<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">策略4数据包长度分布示意图</title>
  <desc id="desc">横坐标为数据包长度，纵坐标为数据包数量。背景业务流呈正态分布，策略数据包分布在四个长度范围。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FAFC"/>
    </linearGradient>
    <linearGradient id="normalFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8C7E8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#A8C7E8" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#203040" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#26313D"/>
    </marker>
    <style>
      .font { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; }
      .title { font-size: 40px; font-weight: 700; fill: #162536; }
      .axis { stroke: #26313D; stroke-width: 4; stroke-linecap: round; }
      .grid { stroke: #D9E2EC; stroke-width: 1.5; stroke-dasharray: 8 10; }
      .axis-label { font-size: 25px; font-weight: 700; fill: #26313D; }
      .tick-label { font-size: 18px; fill: #6B7C8F; }
      .legend { font-size: 22px; fill: #2D3E50; }
      .band-title { font-size: 23px; font-weight: 700; fill: #17212B; }
      .bits { font-size: 28px; font-weight: 700; fill: #17212B; }
      .small { font-size: 18px; fill: #52677A; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="76" text-anchor="middle" class="font title">背景业务流与策略4数据包长度区间示意</text>

  <!-- Plot area -->
  <rect x="130" y="120" width="1340" height="650" rx="22" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Grid -->
  <g>
    <line x1="210" y1="650" x2="1400" y2="650" class="grid"/>
    <line x1="210" y1="540" x2="1400" y2="540" class="grid"/>
    <line x1="210" y1="430" x2="1400" y2="430" class="grid"/>
    <line x1="210" y1="320" x2="1400" y2="320" class="grid"/>
    <line x1="210" y1="210" x2="1400" y2="210" class="grid"/>
  </g>

  <!-- Normal distribution fill and line -->
  <path d="M210 690
           C290 686, 360 660, 430 604
           C515 536, 565 410, 635 300
           C695 205, 750 170, 800 170
           C850 170, 905 205, 965 300
           C1035 410, 1085 536, 1170 604
           C1240 660, 1310 686, 1400 690
           L1400 690 L210 690 Z"
        fill="url(#normalFill)"/>
  <path d="M210 690
           C290 686, 360 660, 430 604
           C515 536, 565 410, 635 300
           C695 205, 750 170, 800 170
           C850 170, 905 205, 965 300
           C1035 410, 1085 536, 1170 604
           C1240 660, 1310 686, 1400 690"
        fill="none" stroke="#4A83B8" stroke-width="7" stroke-linecap="round"/>

  <!-- Strategy bands -->
  <g opacity="0.94">
    <rect x="285" y="575" width="220" height="115" rx="12" fill="#DDF0FF" stroke="#1883C9" stroke-width="4"/>
    <text x="395" y="620" text-anchor="middle" class="font band-title">Band 0</text>
    <text x="395" y="662" text-anchor="middle" class="font bits">00</text>

    <rect x="575" y="465" width="220" height="225" rx="12" fill="#DCF7E4" stroke="#18A058" stroke-width="4"/>
    <text x="685" y="540" text-anchor="middle" class="font band-title">Band 1</text>
    <text x="685" y="584" text-anchor="middle" class="font bits">01</text>

    <rect x="865" y="465" width="220" height="225" rx="12" fill="#FFF2BF" stroke="#D98A00" stroke-width="4"/>
    <text x="975" y="540" text-anchor="middle" class="font band-title">Band 2</text>
    <text x="975" y="584" text-anchor="middle" class="font bits">10</text>

    <rect x="1155" y="575" width="220" height="115" rx="12" fill="#FFE0E0" stroke="#E53935" stroke-width="4"/>
    <text x="1265" y="620" text-anchor="middle" class="font band-title">Band 3</text>
    <text x="1265" y="662" text-anchor="middle" class="font bits">11</text>
  </g>

  <!-- Axes -->
  <line x1="210" y1="690" x2="1425" y2="690" class="axis" marker-end="url(#arrow)"/>
  <line x1="210" y1="690" x2="210" y2="155" class="axis" marker-end="url(#arrow)"/>

  <!-- Ticks -->
  <g class="font tick-label">
    <line x1="320" y1="690" x2="320" y2="704" stroke="#26313D" stroke-width="3"/>
    <line x1="540" y1="690" x2="540" y2="704" stroke="#26313D" stroke-width="3"/>
    <line x1="760" y1="690" x2="760" y2="704" stroke="#26313D" stroke-width="3"/>
    <line x1="980" y1="690" x2="980" y2="704" stroke="#26313D" stroke-width="3"/>
    <line x1="1200" y1="690" x2="1200" y2="704" stroke="#26313D" stroke-width="3"/>
    <text x="320" y="733" text-anchor="middle">小</text>
    <text x="760" y="733" text-anchor="middle">中等长度</text>
    <text x="1200" y="733" text-anchor="middle">大</text>
  </g>

  <!-- Labels -->
  <text x="820" y="820" text-anchor="middle" class="font axis-label">数据包长度</text>
  <text x="68" y="430" text-anchor="middle" class="font axis-label" transform="rotate(-90 68 430)">数据包数量</text>

  <!-- Minimal legend -->
  <g class="font">
    <line x1="1080" y1="160" x2="1160" y2="160" stroke="#4A83B8" stroke-width="7" stroke-linecap="round"/>
    <text x="1178" y="168" class="legend">背景业务流</text>
    <rect x="1080" y="190" width="80" height="28" rx="7" fill="#FFF2BF" stroke="#D98A00" stroke-width="3"/>
    <text x="1178" y="214" class="legend">策略数据包区间</text>
  </g>
</svg>
