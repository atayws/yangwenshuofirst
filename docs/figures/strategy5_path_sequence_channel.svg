<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#30343b"/>
    </marker>
    <style>
      .title { font: 700 34px "Microsoft YaHei", "SimSun", Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 400 20px "Microsoft YaHei", "SimSun", Arial, sans-serif; fill: #4b5563; }
      .label { font: 600 20px "Microsoft YaHei", "SimSun", Arial, sans-serif; fill: #111827; }
      .small { font: 400 17px "Microsoft YaHei", "SimSun", Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 14px "Microsoft YaHei", "SimSun", Arial, sans-serif; fill: #4b5563; }
      .mono { font: 600 17px "Consolas", "Courier New", monospace; fill: #111827; }
      .line { stroke: #30343b; stroke-width: 2.5; fill: none; }
      .dash { stroke: #6b7280; stroke-width: 2; stroke-dasharray: 7 6; fill: none; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .path0 { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .path1 { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .path2 { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .bit-a { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .bit-b { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .bit-c { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .bit-d { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1500" height="820" fill="#ffffff"/>
  <text x="70" y="62" class="title">策略5：多路径路径序列隐蔽信道</text>
  <text x="70" y="99" class="subtitle">真实隐蔽符号由一个窗口内三条路径的排列承载；IP-ID 只保存策略号、路径提示和片段序号。</text>

  <rect x="80" y="150" width="380" height="170" class="box"/>
  <text x="110" y="190" class="label">2 bit → 路径排列</text>
  <text x="110" y="230" class="small">00 → (0, 1, 2)</text>
  <text x="110" y="262" class="small">01 → (0, 2, 1)</text>
  <text x="110" y="294" class="small">10 → (1, 0, 2)</text>

  <rect x="510" y="150" width="830" height="170" class="box"/>
  <text x="540" y="190" class="label">一个路径窗口 = 3 个业务包</text>
  <g transform="translate(540,220)">
    <rect x="0" y="0" width="170" height="64" class="path0"/>
    <text x="39" y="39" class="small">slot0: path0</text>
    <line x1="180" y1="32" x2="265" y2="32" class="line" marker-end="url(#arrow)"/>
    <rect x="285" y="0" width="170" height="64" class="path1"/>
    <text x="324" y="39" class="small">slot1: path1</text>
    <line x1="465" y1="32" x2="550" y2="32" class="line" marker-end="url(#arrow)"/>
    <rect x="570" y="0" width="170" height="64" class="path2"/>
    <text x="609" y="39" class="small">slot2: path2</text>
  </g>

  <text x="80" y="385" class="label">路径拓扑中的承载方式</text>
  <g transform="translate(90,430)">
    <rect x="0" y="90" width="110" height="64" class="box"/>
    <text x="33" y="130" class="label">s1</text>
    <rect x="1220" y="90" width="110" height="64" class="box"/>
    <text x="1253" y="130" class="label">s2</text>

    <line x1="120" y1="52" x2="1210" y2="52" class="line"/>
    <line x1="120" y1="122" x2="1210" y2="122" class="line"/>
    <line x1="120" y1="192" x2="1210" y2="192" class="line"/>
    <text x="580" y="38" class="small">path0</text>
    <text x="580" y="108" class="small">path1</text>
    <text x="580" y="178" class="small">path2</text>

    <circle cx="300" cy="52" r="18" fill="#2563eb"/>
    <text x="294" y="58" font-family="Consolas" font-size="18" fill="#fff">1</text>
    <circle cx="560" cy="122" r="18" fill="#16a34a"/>
    <text x="554" y="128" font-family="Consolas" font-size="18" fill="#fff">2</text>
    <circle cx="820" cy="192" r="18" fill="#d97706"/>
    <text x="814" y="198" font-family="Consolas" font-size="18" fill="#fff">3</text>
  </g>

  <text x="80" y="675" class="label">IP-ID 辅助字段</text>
  <g transform="translate(80,700)">
    <rect x="0" y="0" width="65" height="70" class="bit-a"/>
    <rect x="65" y="0" width="195" height="70" class="bit-b"/>
    <rect x="260" y="0" width="170" height="70" class="bit-c"/>
    <rect x="430" y="0" width="430" height="70" class="bit-d"/>
    <text x="17" y="29" class="mono">1</text>
    <text x="10" y="55" class="tiny">flag</text>
    <text x="103" y="29" class="mono">101</text>
    <text x="91" y="55" class="tiny">strategy=5</text>
    <text x="298" y="29" class="mono">path</text>
    <text x="303" y="55" class="tiny">2 bit</text>
    <text x="540" y="29" class="mono">cipher_fragment</text>
    <text x="556" y="55" class="tiny">10 bit</text>
  </g>

  <rect x="1000" y="690" width="390" height="88" class="box"/>
  <text x="1030" y="724" class="small">接收端按 fragment_id 划分窗口</text>
  <text x="1030" y="752" class="tiny">恢复每 3 包的路径排列，再映射回 2 bit。</text>
</svg>
