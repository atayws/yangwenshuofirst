<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">策略4喷泉码多路径协同隐蔽传输示意图</title>
  <desc id="desc">以图形化方式展示策略4将4bit源符号组成frame，生成冗余编码符号，经多路径加权轮询发送，并在接收端通过高斯消元恢复源序列。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGray" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#059669"/>
    </marker>
    <style>
      .cn { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "PingFang SC", "SimHei", Arial, sans-serif; }
      .math { font-family: "Cambria Math", "Times New Roman", Cambria, serif; font-style: italic; }
      .title { font-size: 40px; font-weight: 700; fill: #0F172A; letter-spacing: .2px; }
      .subtitle { font-size: 20px; fill: #64748B; }
      .section { font-size: 25px; font-weight: 800; fill: #0F172A; }
      .caption { font-size: 17px; fill: #64748B; }
      .small { font-size: 16px; fill: #64748B; }
      .formula { font-size: 26px; fill: #111827; }
      .formulaSmall { font-size: 20px; fill: #334155; }
      .symbol { font-size: 22px; font-weight: 800; fill: #FFFFFF; }
      .symbolDark { font-size: 22px; font-weight: 800; fill: #0F172A; }
      .pathLabel { font-size: 22px; font-weight: 800; fill: #334155; }
      .note { font-size: 20px; font-weight: 700; fill: #0F172A; }
      .box { fill: #FFFFFF; stroke: #CBD5E1; }
      .arrow { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .thinArrow { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1800" height="1000" fill="url(#bg)"/>

  <text x="900" y="62" text-anchor="middle" class="cn title">策略4：IP-ID 喷泉码多路径协同隐蔽传输</text>
  <text x="900" y="100" text-anchor="middle" class="cn subtitle">源符号分帧 → 喷泉码冗余编码 → 多路径加权发送 → 收集足够独立符号后恢复</text>

  <!-- Stage 1: split into frame -->
  <g filter="url(#shadow)">
    <rect x="70" y="190" width="365" height="250" rx="26" class="box" stroke-width="2"/>
  </g>
  <text x="252" y="235" text-anchor="middle" class="cn section">1. 4bit 分帧</text>
  <text x="252" y="270" text-anchor="middle" class="math formulaSmall">frame = {x₁, x₂, …, xₖ}</text>
  <g>
    <rect x="112" y="315" width="56" height="48" rx="12" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="140" y="346" text-anchor="middle" class="math symbol">x₁</text>
    <rect x="180" y="315" width="56" height="48" rx="12" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="208" y="346" text-anchor="middle" class="math symbol">x₂</text>
    <rect x="248" y="315" width="56" height="48" rx="12" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="276" y="346" text-anchor="middle" class="math symbol">x₃</text>
    <text x="335" y="348" text-anchor="middle" class="math symbolDark">…</text>
    <rect x="365" y="315" width="56" height="48" rx="12" fill="#2563EB" filter="url(#softShadow)"/>
    <text x="393" y="346" text-anchor="middle" class="math symbol">xₖ</text>
  </g>
  <text x="252" y="405" text-anchor="middle" class="cn caption">每个小块承载 4bit 数据</text>

  <!-- Arrow to encoder -->
  <path d="M435 315 L525 315" class="arrow" stroke="#2563EB" marker-end="url(#arrowBlue)"/>

  <!-- Stage 2: fountain encoder -->
  <g filter="url(#shadow)">
    <rect x="525" y="160" width="480" height="310" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  </g>
  <text x="765" y="210" text-anchor="middle" class="cn section">2. 喷泉码编码</text>
  <text x="765" y="248" text-anchor="middle" class="cn caption">生成多于 K 个的编码符号</text>

  <!-- source symbols inside encoder -->
  <g>
    <rect x="590" y="288" width="54" height="46" rx="11" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="617" y="318" text-anchor="middle" class="math symbolDark">xₐ</text>
    <rect x="685" y="288" width="54" height="46" rx="11" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="712" y="318" text-anchor="middle" class="math symbolDark">xᵦ</text>
    <rect x="780" y="288" width="54" height="46" rx="11" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="807" y="318" text-anchor="middle" class="math symbolDark">x𝒸</text>
  </g>
  <text x="664" y="315" text-anchor="middle" class="math formulaSmall">⊕</text>
  <text x="759" y="315" text-anchor="middle" class="math formulaSmall">⊕</text>
  <path d="M835 312 L900 312" class="thinArrow" stroke="#475569" marker-end="url(#arrowGray)"/>
  <rect x="900" y="284" width="62" height="54" rx="13" fill="#F97316" filter="url(#softShadow)"/>
  <text x="931" y="318" text-anchor="middle" class="math symbol">xₘ</text>

  <g>
    <rect x="585" y="382" width="52" height="44" rx="10" fill="#2563EB"/>
    <text x="611" y="411" text-anchor="middle" class="math symbol">x₁</text>
    <rect x="647" y="382" width="52" height="44" rx="10" fill="#2563EB"/>
    <text x="673" y="411" text-anchor="middle" class="math symbol">x₂</text>
    <rect x="709" y="382" width="52" height="44" rx="10" fill="#2563EB"/>
    <text x="735" y="411" text-anchor="middle" class="math symbol">xₖ</text>
    <text x="793" y="412" text-anchor="middle" class="math symbolDark">…</text>
    <rect x="830" y="382" width="52" height="44" rx="10" fill="#F97316"/>
    <text x="856" y="411" text-anchor="middle" class="math symbol">xₘ</text>
    <rect x="892" y="382" width="52" height="44" rx="10" fill="#F97316"/>
    <text x="918" y="411" text-anchor="middle" class="math symbol">xₘ₊₁</text>
  </g>

  <!-- Arrow to multipath -->
  <path d="M1005 315 L1090 315" class="arrow" stroke="#2563EB" marker-end="url(#arrowBlue)"/>

  <!-- Stage 3: weighted multipath -->
  <g filter="url(#shadow)">
    <rect x="1090" y="160" width="640" height="460" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  </g>
  <text x="1410" y="210" text-anchor="middle" class="cn section">3. 多路径加权轮询发送</text>
  <text x="1410" y="248" text-anchor="middle" class="cn caption">将 m 个编码符号分散到至少 2 条路径</text>

  <!-- paths -->
  <text x="1135" y="314" text-anchor="end" class="cn pathLabel">Path 0</text>
  <text x="1135" y="414" text-anchor="end" class="cn pathLabel">Path 1</text>
  <text x="1135" y="514" text-anchor="end" class="cn pathLabel">Path 2</text>
  <line x1="1160" y1="305" x2="1665" y2="305" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
  <line x1="1160" y1="405" x2="1665" y2="405" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
  <line x1="1160" y1="505" x2="1665" y2="505" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
  <path d="M1160 305 L1665 305" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowGray)" opacity=".65"/>
  <path d="M1160 405 L1665 405" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowGray)" opacity=".65"/>
  <path d="M1160 505 L1665 505" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowGray)" opacity=".65"/>

  <!-- packets on paths -->
  <rect x="1205" y="275" width="56" height="56" rx="14" fill="#2563EB" filter="url(#softShadow)"/>
  <text x="1233" y="310" text-anchor="middle" class="math symbol">x₁</text>
  <rect x="1345" y="275" width="56" height="56" rx="14" fill="#F97316" filter="url(#softShadow)"/>
  <text x="1373" y="310" text-anchor="middle" class="math symbol">xₘ</text>
  <rect x="1510" y="275" width="56" height="56" rx="14" fill="#F97316" filter="url(#softShadow)"/>
  <text x="1538" y="310" text-anchor="middle" class="math symbol">xₘ₊₂</text>

  <rect x="1265" y="375" width="56" height="56" rx="14" fill="#2563EB" filter="url(#softShadow)"/>
  <text x="1293" y="410" text-anchor="middle" class="math symbol">x₂</text>
  <rect x="1435" y="375" width="56" height="56" rx="14" fill="#F97316" filter="url(#softShadow)"/>
  <text x="1463" y="410" text-anchor="middle" class="math symbol">xₘ₊₁</text>

  <rect x="1215" y="475" width="56" height="56" rx="14" fill="#2563EB" filter="url(#softShadow)"/>
  <text x="1243" y="510" text-anchor="middle" class="math symbol">x₃</text>
  <rect x="1385" y="475" width="56" height="56" rx="14" fill="#2563EB" filter="url(#softShadow)"/>
  <text x="1413" y="510" text-anchor="middle" class="math symbol">xₖ</text>

  <g>
    <rect x="1258" y="565" width="304" height="42" rx="21" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="1410" y="592" text-anchor="middle" class="cn small">路径权重由链路状态决定</text>
  </g>

  <!-- Receiver recovery stage -->
  <g filter="url(#shadow)">
    <rect x="460" y="690" width="880" height="210" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  </g>
  <text x="900" y="740" text-anchor="middle" class="cn section">4. 接收端恢复</text>
  <text x="900" y="782" text-anchor="middle" class="cn caption">收到不少于 K 个线性独立符号后，通过高斯消元恢复源 frame</text>

  <!-- equations and visual matrix -->
  <g>
    <rect x="545" y="820" width="52" height="42" rx="10" fill="#2563EB"/>
    <text x="571" y="848" text-anchor="middle" class="math symbol">x₁</text>
    <rect x="610" y="820" width="52" height="42" rx="10" fill="#2563EB"/>
    <text x="636" y="848" text-anchor="middle" class="math symbol">x₂</text>
    <text x="685" y="848" text-anchor="middle" class="math symbolDark">…</text>
    <rect x="720" y="820" width="52" height="42" rx="10" fill="#2563EB"/>
    <text x="746" y="848" text-anchor="middle" class="math symbol">xₖ</text>
  </g>
  <path d="M795 842 L905 842" class="arrow" stroke="#059669" marker-end="url(#arrowGreen)"/>
  <g>
    <rect x="930" y="805" width="56" height="70" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
    <line x1="948" y1="805" x2="948" y2="875" stroke="#059669" stroke-width="1.4" opacity=".55"/>
    <line x1="968" y1="805" x2="968" y2="875" stroke="#059669" stroke-width="1.4" opacity=".55"/>
    <line x1="930" y1="828" x2="986" y2="828" stroke="#059669" stroke-width="1.4" opacity=".55"/>
    <line x1="930" y1="852" x2="986" y2="852" stroke="#059669" stroke-width="1.4" opacity=".55"/>
    <circle cx="940" cy="817" r="4" fill="#059669"/>
    <circle cx="960" cy="840" r="4" fill="#059669"/>
    <circle cx="978" cy="865" r="4" fill="#059669"/>
  </g>
  <text x="1080" y="833" text-anchor="middle" class="math formula">rank ≥ K</text>
  <text x="1080" y="866" text-anchor="middle" class="cn caption">高斯消元</text>

  <!-- simple legend -->
  <g class="cn">
    <rect x="670" y="925" width="30" height="22" rx="6" fill="#2563EB"/>
    <text x="715" y="943" class="caption">源符号</text>
    <rect x="820" y="925" width="30" height="22" rx="6" fill="#F97316"/>
    <text x="865" y="943" class="caption">冗余编码符号</text>
    <line x1="1040" y1="936" x2="1110" y2="936" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
    <text x="1130" y="943" class="caption">多路径承载</text>
  </g>
</svg>
