<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">策略5多路径路径序列隐蔽传输示意图</title>
  <desc id="desc">三条并行路径上展示四组三包窗口，每组用一种颜色表示，组内数据包按发送顺序编号，路径排列映射为隐蔽符号。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="cardShadow" x="-8%" y="-12%" width="116%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.11"/>
    </filter>
    <filter id="packetShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .cn { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "PingFang SC", "SimHei", Arial, sans-serif; }
      .math { font-family: "Cambria Math", "Times New Roman", serif; font-style: italic; }
      .title { font-size: 40px; font-weight: 700; fill: #0F172A; letter-spacing: .2px; }
      .subtitle { font-size: 20px; fill: #64748B; }
      .lane { stroke: #CBD5E1; stroke-width: 8; stroke-linecap: round; }
      .laneThin { stroke: #94A3B8; stroke-width: 2.2; stroke-dasharray: 9 9; }
      .laneLabel { font-size: 24px; font-weight: 700; fill: #334155; }
      .nodeTitle { font-size: 25px; font-weight: 700; fill: #0F172A; }
      .nodeSub { font-size: 17px; fill: #64748B; }
      .groupTitle { font-size: 22px; font-weight: 700; fill: #0F172A; }
      .seq { font-size: 16px; fill: #64748B; }
      .packetNo { font-size: 24px; font-weight: 800; fill: #FFFFFF; }
      .legend { font-size: 18px; fill: #334155; }
      .noteTitle { font-size: 24px; font-weight: 700; fill: #0F172A; }
      .note { font-size: 18px; fill: #475569; }
    </style>
  </defs>

  <rect width="1800" height="1000" fill="url(#bg)"/>

  <text x="900" y="64" text-anchor="middle" class="cn title">策略5：多路径路径序列隐蔽传输</text>
  <text x="900" y="102" text-anchor="middle" class="cn subtitle">每组三个业务包按不同路径排列，路径序列映射为隐蔽符号</text>

  <!-- Sender / receiver cards -->
  <g filter="url(#cardShadow)">
    <rect x="48" y="274" width="136" height="392" rx="24" fill="#FFFFFF" stroke="#D8E0EA" stroke-width="2"/>
  </g>
  <text x="116" y="438" text-anchor="middle" class="cn nodeTitle">发送端</text>
  <text x="116" y="474" text-anchor="middle" class="cn nodeSub">序列编码</text>

  <g filter="url(#cardShadow)">
    <rect x="1548" y="274" width="160" height="392" rx="24" fill="#FFFFFF" stroke="#D8E0EA" stroke-width="2"/>
  </g>
  <text x="1628" y="438" text-anchor="middle" class="cn nodeTitle">接收端</text>
  <text x="1628" y="474" text-anchor="middle" class="cn nodeSub">路径序列解码</text>

  <!-- Lanes -->
  <line x1="335" y1="310" x2="1508" y2="310" class="lane"/>
  <line x1="335" y1="470" x2="1508" y2="470" class="lane"/>
  <line x1="335" y1="630" x2="1508" y2="630" class="lane"/>
  <path d="M335 310 L1508 310" stroke="#475569" stroke-width="2.5" opacity="0.45" marker-end="url(#arrow)"/>
  <path d="M335 470 L1508 470" stroke="#475569" stroke-width="2.5" opacity="0.45" marker-end="url(#arrow)"/>
  <path d="M335 630 L1508 630" stroke="#475569" stroke-width="2.5" opacity="0.45" marker-end="url(#arrow)"/>

  <text x="318" y="318" text-anchor="end" class="cn laneLabel">Path 0</text>
  <text x="318" y="478" text-anchor="end" class="cn laneLabel">Path 1</text>
  <text x="318" y="638" text-anchor="end" class="cn laneLabel">Path 2</text>

  <!-- Group separators -->
  <line x1="575" y1="242" x2="575" y2="682" class="laneThin"/>
  <line x1="840" y1="242" x2="840" y2="682" class="laneThin"/>
  <line x1="1105" y1="242" x2="1105" y2="682" class="laneThin"/>
  <line x1="1370" y1="242" x2="1370" y2="682" class="laneThin"/>

  <!-- Group labels -->
  <g>
    <rect x="350" y="170" width="190" height="62" rx="18" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
    <text x="445" y="197" text-anchor="middle" class="cn groupTitle">符号 00</text>
    <text x="445" y="222" text-anchor="middle" class="cn seq">0 → 1 → 2</text>

    <rect x="615" y="170" width="190" height="62" rx="18" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
    <text x="710" y="197" text-anchor="middle" class="cn groupTitle">符号 01</text>
    <text x="710" y="222" text-anchor="middle" class="cn seq">1 → 2 → 0</text>

    <rect x="880" y="170" width="190" height="62" rx="18" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
    <text x="975" y="197" text-anchor="middle" class="cn groupTitle">符号 10</text>
    <text x="975" y="222" text-anchor="middle" class="cn seq">2 → 0 → 1</text>

    <rect x="1145" y="170" width="190" height="62" rx="18" fill="#FDF2F8" stroke="#DB2777" stroke-width="2"/>
    <text x="1240" y="197" text-anchor="middle" class="cn groupTitle">符号 11</text>
    <text x="1240" y="222" text-anchor="middle" class="cn seq">0 → 2 → 1</text>
  </g>

  <!-- Packets: group x positions are evenly spaced, order left-to-right -->
  <!-- Group 00: 0 -> 1 -> 2 -->
  <circle cx="392" cy="310" r="31" fill="#2563EB" filter="url(#packetShadow)"/>
  <text x="392" y="319" text-anchor="middle" class="cn packetNo">1</text>
  <circle cx="445" cy="470" r="31" fill="#2563EB" filter="url(#packetShadow)"/>
  <text x="445" y="479" text-anchor="middle" class="cn packetNo">2</text>
  <circle cx="498" cy="630" r="31" fill="#2563EB" filter="url(#packetShadow)"/>
  <text x="498" y="639" text-anchor="middle" class="cn packetNo">3</text>
  <path d="M402 340 C415 382, 430 425, 438 441" fill="none" stroke="#2563EB" stroke-width="3" stroke-dasharray="8 7" opacity="0.75"/>
  <path d="M455 500 C468 542, 484 585, 491 601" fill="none" stroke="#2563EB" stroke-width="3" stroke-dasharray="8 7" opacity="0.75"/>

  <!-- Group 01: 1 -> 2 -> 0 -->
  <circle cx="657" cy="470" r="31" fill="#059669" filter="url(#packetShadow)"/>
  <text x="657" y="479" text-anchor="middle" class="cn packetNo">1</text>
  <circle cx="710" cy="630" r="31" fill="#059669" filter="url(#packetShadow)"/>
  <text x="710" y="639" text-anchor="middle" class="cn packetNo">2</text>
  <circle cx="763" cy="310" r="31" fill="#059669" filter="url(#packetShadow)"/>
  <text x="763" y="319" text-anchor="middle" class="cn packetNo">3</text>
  <path d="M667 500 C680 542, 695 585, 703 601" fill="none" stroke="#059669" stroke-width="3" stroke-dasharray="8 7" opacity="0.75"/>
  <path d="M721 601 C744 525, 755 395, 759 341" fill="none" stroke="#059669" stroke-width="3" stroke-dasharray="8 7" opacity="0.75"/>

  <!-- Group 10: 2 -> 0 -> 1 -->
  <circle cx="922" cy="630" r="31" fill="#EA580C" filter="url(#packetShadow)"/>
  <text x="922" y="639" text-anchor="middle" class="cn packetNo">1</text>
  <circle cx="975" cy="310" r="31" fill="#EA580C" filter="url(#packetShadow)"/>
  <text x="975" y="319" text-anchor="middle" class="cn packetNo">2</text>
  <circle cx="1028" cy="470" r="31" fill="#EA580C" filter="url(#packetShadow)"/>
  <text x="1028" y="479" text-anchor="middle" class="cn packetNo">3</text>
  <path d="M933 601 C956 525, 968 395, 972 341" fill="none" stroke="#EA580C" stroke-width="3" stroke-dasharray="8 7" opacity="0.75"/>
  <path d="M985 340 C998 382, 1014 425, 1021 441" fill="none" stroke="#EA580C" stroke-width="3" stroke-dasharray="8 7" opacity="0.75"/>

  <!-- Group 11: 0 -> 2 -> 1 -->
  <circle cx="1187" cy="310" r="31" fill="#DB2777" filter="url(#packetShadow)"/>
  <text x="1187" y="319" text-anchor="middle" class="cn packetNo">1</text>
  <circle cx="1240" cy="630" r="31" fill="#DB2777" filter="url(#packetShadow)"/>
  <text x="1240" y="639" text-anchor="middle" class="cn packetNo">2</text>
  <circle cx="1293" cy="470" r="31" fill="#DB2777" filter="url(#packetShadow)"/>
  <text x="1293" y="479" text-anchor="middle" class="cn packetNo">3</text>
  <path d="M1198 340 C1221 416, 1232 546, 1236 599" fill="none" stroke="#DB2777" stroke-width="3" stroke-dasharray="8 7" opacity="0.75"/>
  <path d="M1251 601 C1265 558, 1280 515, 1287 500" fill="none" stroke="#DB2777" stroke-width="3" stroke-dasharray="8 7" opacity="0.75"/>

  <!-- Encoding note -->
  <g filter="url(#cardShadow)">
    <rect x="380" y="740" width="1040" height="108" rx="24" fill="#FFFFFF" stroke="#D8E0EA" stroke-width="2"/>
  </g>
  <text x="900" y="784" text-anchor="middle" class="cn noteTitle">编码规则</text>
  <text x="900" y="824" text-anchor="middle" class="cn note">同一颜色表示一个三包窗口；圆圈内编号表示组内发送顺序；三包经过的路径排列映射为隐蔽符号。</text>

  <!-- Legend -->
  <circle cx="575" cy="912" r="11" fill="#2563EB"/>
  <text x="600" y="919" class="cn legend">一组三包窗口</text>
  <line x1="790" y1="912" x2="870" y2="912" stroke="#64748B" stroke-width="3" stroke-dasharray="8 7"/>
  <text x="892" y="919" class="cn legend">组内顺序关系</text>
  <text x="1085" y="919" class="cn legend">示例：Path 0 → Path 1 → Path 2 映射为符号 00</text>
</svg>
